substitutions:
  name: alarma-x28
  friendly_name: "Alarma X-28"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

external_components:
  - source: github://abelbour/esphome-x28-mpx-h-connector@main
    components: [ x28_alarm ]

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

logger:

x28_alarm:
  id: alarma
  rx_pin: GPIO16
  tx_pin: GPIO17
  code: "1251"
  installer_code: "467825"
  model: AUTO

alarm_control_panel:
  - platform: x28_alarm
    name: ${friendly_name}
    id: panel

binary_sensor:
  - platform: x28_alarm
    type: zone
    zone: 1
    name: "Zona 1"

button:
  - platform: x28_alarm
    type: panic
    name: "Panico"
